# Server
server.port=${APP_PORT:8081}
server.servlet.context-path=

# Spring
spring.application.name=coupon-sunbbang
spring.config.import=optional:file:.env[.properties]

# Datasource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/coupon_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=StudyDiaryHikariCP

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.encoding=UTF-8

# Validation
spring.messages.basename=messages/validation
spring.messages.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.com.study.myspringstudydiary=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

